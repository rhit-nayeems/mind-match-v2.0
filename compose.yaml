services:
  backend:
    build: ./backend
    container_name: mindmatch-backend
    environment:
      - TMDB_BEARER=${TMDB_BEARER}
      - MOVIES_DB=/app/app/datasets/movies_core.db
      - CATALOG_MAX_MOVIES=${CATALOG_MAX_MOVIES:-0}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/app:/app/app
      - ./backend/app/datasets:/app/app/datasets
      - ./backend/scripts:/app/scripts
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:8000
    container_name: mindmatch-frontend
    depends_on:
      - backend
    ports:
      - "4173:4173"


